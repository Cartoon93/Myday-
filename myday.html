<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="My Day">
<meta name="theme-color" content="#0a0a0a">
<title>My Day</title>
<style>
:root{--green:#4ade80;--blue:#38bdf8;--purple:#a78bfa;--amber:#f59e0b;--orange:#fb923c;--pink:#e879f9;--teal:#34d399;--rose:#f472b6;--peach:#fdba74}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html{height:100%;background:#0a0a0a}
body{min-height:100%;min-height:-webkit-fill-available;background:#0a0a0a;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;color:#fff;overflow-x:hidden;-webkit-overflow-scrolling:touch}
button{cursor:pointer;font-family:inherit;border:none;background:none;color:inherit;font-size:inherit;-webkit-appearance:none;appearance:none}
.page{display:none;min-height:100svh;min-height:100vh;padding:0 0 60px}
.page.on{display:block}
/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:52px 20px 16px}
.hdr-left .eyebrow{color:#555;font-size:11px;font-weight:600;letter-spacing:.12em;display:flex;align-items:center;gap:6px}
.hdr-left .dname{color:#fff;font-size:22px;font-weight:700;margin-top:3px}
.day-chip{font-size:10px;font-weight:700;letter-spacing:.06em;padding:2px 8px;border-radius:20px}
.cal-btn{width:40px;height:40px;border-radius:12px;background:#161616;border:1px solid #222;display:flex;align-items:center;justify-content:center;color:#888}
/* Progress ring card */
.ring-card{margin:0 16px 20px;background:#111;border-radius:18px;padding:18px 20px;display:flex;align-items:center;gap:16px;border:1px solid #1c1c1c}
.ring-card svg{flex-shrink:0}
.ring-text .rt1{color:#fff;font-size:18px;font-weight:700}
.ring-text .rt2{color:#555;font-size:13px;margin-top:3px}
.ring-text .rt3{color:var(--green);font-size:13px;margin-top:6px;display:none}
/* Section label */
.slabel{color:#3a3a3a;font-size:11px;font-weight:600;letter-spacing:.12em;padding:0 16px 10px}
/* Routine cards */
.rcards{display:flex;flex-direction:column;gap:10px;padding:0 16px}
.rc{background:#111;border:1px solid #222;border-radius:16px;padding:16px;width:100%;text-align:left;transition:opacity .2s;-webkit-appearance:none;appearance:none}
.rc.done{opacity:.65;border-color:#1a1a1a}
.rc-row{display:flex;align-items:center;gap:12px}
.rc-icon{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.rc-mid{flex:1;min-width:0}
.rc-name{color:#fff;font-size:15px;font-weight:600;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.rc-badge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px}
.rc-sub{color:#555;font-size:12px;margin-top:3px}
.rc-right{text-align:right;flex-shrink:0}
.rc-streak{font-size:14px;font-weight:700}
.rc-min{color:#444;font-size:12px;margin-top:2px}
.rc-bar{display:flex;gap:2px;margin-top:12px;height:3px;border-radius:3px;overflow:hidden}
/* Timer page */
.thdr{display:flex;align-items:center;padding:52px 20px 16px;gap:10px}
.back-btn{width:36px;height:36px;border-radius:10px;background:#161616;border:1px solid #222;display:flex;align-items:center;justify-content:center;color:#888;flex-shrink:0}
.thdr-title{flex:1;text-align:center;color:#555;font-size:11px;font-weight:600;letter-spacing:.12em}
.timer-center{display:flex;flex-direction:column;align-items:center;padding:4px 0 0}
.timer-btns{display:flex;gap:12px;margin-top:16px}
.tbtn{padding:14px 40px;border-radius:50px;font-weight:700;font-size:16px;letter-spacing:.02em}
.tbtn-reset{padding:14px 22px;border-radius:50px;border:1px solid #2a2a2a;color:#666;font-size:16px;background:#161616}
/* Task breakdown */
.tlist{display:flex;flex-direction:column;gap:8px;padding:0 16px 16px}
.trow{background:#111;border-radius:12px;padding:14px;border-left:3px solid #1e1e1e}
.trow.cur{border-left-color:var(--c)}
.trow.done{border-left-color:#1e1e1e}
.tr-top{display:flex;align-items:center;gap:10px}
.tnum{width:24px;height:24px;border-radius:50%;border:1.5px solid #2a2a2a;background:#161616;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#555;flex-shrink:0}
.trow.cur .tnum{background:var(--c);border-color:var(--c);color:#000}
.trow.done .tnum{background:transparent;border-color:#333;color:#555}
.tlbl{flex:1;font-size:14px;color:#666;line-height:1.3}
.trow.cur .tlbl{color:#fff}
.trow.done .tlbl{color:#333;text-decoration:line-through}
.ttim{font-size:13px;color:#444;font-variant-numeric:tabular-nums}
.trow.cur .ttim{color:var(--c);font-weight:700}
.tbar{height:3px;background:#1a1a1a;border-radius:2px;margin-top:10px;overflow:hidden;display:none}
.trow.cur .tbar{display:block}
.tbarf{height:100%;border-radius:2px;width:0;transition:width 1s linear}
/* Workout panel */
.wkt{background:#0c180c;border:1px solid #4ade8030;border-radius:10px;margin-top:10px;display:none}
.trow.cur .wkt{display:block}
.wkt-top{display:flex;align-items:center;justify-content:space-between;padding:10px 12px 8px;border-bottom:1px solid #4ade8020}
.wkt-ttl{color:var(--green);font-size:11px;font-weight:700;letter-spacing:.1em}
.wkt-prog-txt{color:#4ade8099;font-size:11px;font-weight:600}
.wkt-pbar{height:2px;background:#1a1a1a;margin:0 12px 10px}
.wkt-pbar-f{height:100%;background:var(--green);transition:width .3s}
.wkt-round{border-top:1px solid #4ade8015}
.wkt-round:first-child{border-top:none}
.wkt-rlbl{padding:8px 12px 4px;font-size:10px;font-weight:700;letter-spacing:.1em;color:#4ade8055}
.wkt-rlbl.active{color:#4ade80bb}
.wkt-rlbl.rdone{color:var(--green)}
.wkt-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:0 8px 8px}
.wex{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;background:#111;border:1px solid #1e1e1e;cursor:pointer;width:100%;text-align:left}
.wex.chk{background:#4ade8012;border-color:#4ade8040}
.wex-dot{width:18px;height:18px;border-radius:50%;border:1.5px solid #2a2a2a;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px}
.wex.chk .wex-dot{border-color:var(--green);background:#4ade8020;color:var(--green)}
.wex-reps{font-size:13px;font-weight:700;color:#fff;line-height:1}
.wex.chk .wex-reps{color:#3a3a3a}
.wex-name{font-size:10px;color:#555;margin-top:1px}
.wex.chk .wex-name{color:#2a2a2a}
.complete-wrap{padding:0 16px 20px}
.cbtn{width:100%;padding:16px;border-radius:14px;font-weight:700;font-size:16px;cursor:pointer;border:none}
/* Calendar */
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:0 16px 16px}
.cal-arr{width:38px;height:38px;border-radius:10px;background:#161616;border:1px solid #222;color:#888;font-size:20px;display:flex;align-items:center;justify-content:center}
.cal-mth{color:#fff;font-size:17px;font-weight:700}
.cal-wrap{padding:0 16px}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px}
.cal-d{text-align:center;color:#444;font-size:11px;padding:4px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-cell{aspect-ratio:1;border-radius:7px;background:#161616;border:1px solid #1a1a1a;display:flex;flex-direction:column;align-items:center;justify-content:center}
.cal-cell.past{background:#0d0d0d}
.cal-cell.today{border:2px solid var(--green)}
.cal-dn{font-size:12px;color:#333;font-weight:400}
.cal-cell.today .cal-dn{color:var(--green);font-weight:700}
.cal-dc{font-size:8px;color:#4ade8099;margin-top:1px}
.cal-leg{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
.cal-leg-i{display:flex;align-items:center;gap:5px;color:#444;font-size:11px}
.cal-leg-d{width:8px;height:8px;border-radius:2px}
.slist{padding:0 16px;display:flex;flex-direction:column;gap:8px}
.srow{background:#111;border:1px solid #1c1c1c;border-radius:13px;padding:13px 14px;display:flex;align-items:center;gap:12px}
.srow-ic{font-size:20px}
.srow-mid{flex:1;min-width:0}
.srow-nm{color:#ccc;font-size:13px;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.srow-b{height:3px;background:#1a1a1a;border-radius:2px}
.srow-bf{height:100%;border-radius:2px;transition:width .5s}
.srow-r{text-align:right;flex-shrink:0}
.srow-n{font-size:16px;font-weight:700}
.srow-l{color:#444;font-size:11px}
</style>
</head>
<body>

<!-- HOME -->
<div id="p-home" class="page on">
  <div class="hdr">
    <div class="hdr-left">
      <div class="eyebrow">TODAY <span id="h-chip" class="day-chip"></span></div>
      <div class="dname" id="h-date"></div>
    </div>
    <button class="cal-btn" onclick="goTo('cal')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
    </button>
  </div>
  <div class="ring-card">
    <svg width="110" height="110" viewBox="0 0 110 110">
      <circle cx="55" cy="55" r="46" stroke="#1e1e1e" stroke-width="9" fill="none"/>
      <circle id="rarc" cx="55" cy="55" r="46" stroke="#38bdf8" stroke-width="9" fill="none"
        stroke-dasharray="289" stroke-dashoffset="289" stroke-linecap="round"
        transform="rotate(-90 55 55)" style="transition:stroke-dashoffset .6s ease"/>
      <text x="55" y="51" text-anchor="middle" fill="#fff" font-size="22" font-weight="700" id="rpct">0%</text>
      <text x="55" y="66" text-anchor="middle" fill="#555" font-size="10" id="rsub">0/0</text>
    </svg>
    <div class="ring-text">
      <div class="rt1">Day Progress</div>
      <div class="rt2">Complete all routines</div>
      <div class="rt3" id="rwin">🎉 Perfect day!</div>
    </div>
  </div>
  <div class="slabel">ROUTINES</div>
  <div class="rcards" id="rcards"></div>
</div>

<!-- TIMER -->
<div id="p-timer" class="page">
  <div class="thdr">
    <button class="back-btn" onclick="goTo('home')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="thdr-title" id="t-hdr"></div>
    <div style="width:36px"></div>
  </div>
  <div class="timer-center">
    <svg width="180" height="180" viewBox="0 0 180 180">
      <circle cx="90" cy="90" r="76" stroke="#161616" stroke-width="12" fill="none"/>
      <circle id="tarc" cx="90" cy="90" r="76" stroke="#4ade80" stroke-width="12" fill="none"
        stroke-dasharray="477.5" stroke-dashoffset="477.5" stroke-linecap="round"
        transform="rotate(-90 90 90)" style="transition:stroke-dashoffset .5s linear"/>
      <text x="90" y="84" text-anchor="middle" fill="#fff" font-size="34" font-weight="700" id="t-time">00:00</text>
      <text x="90" y="106" text-anchor="middle" fill="#444" font-size="12">remaining</text>
    </svg>
    <div class="timer-btns">
      <button class="tbtn" id="t-playbtn" onclick="toggleTimer()">▶  Start</button>
      <button class="tbtn-reset" onclick="resetTimer()">↺</button>
    </div>
  </div>
  <div class="slabel" style="padding-top:22px">BREAKDOWN</div>
  <div class="tlist" id="tlist"></div>
  <div class="complete-wrap">
    <button class="cbtn" id="cbtn" onclick="completeR()">✓ Mark as Complete</button>
  </div>
</div>

<!-- CALENDAR -->
<div id="p-cal" class="page">
  <div class="thdr">
    <button class="back-btn" onclick="goTo('home')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="thdr-title">STREAK CALENDAR</div>
    <div style="width:36px"></div>
  </div>
  <div class="cal-nav">
    <button class="cal-arr" onclick="calMove(-1)">&#8249;</button>
    <span class="cal-mth" id="cal-mth"></span>
    <button class="cal-arr" onclick="calMove(1)">&#8250;</button>
  </div>
  <div class="cal-wrap">
    <div class="cal-dow" id="cal-dow"></div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="cal-leg">
      <div class="cal-leg-i"><div class="cal-leg-d" style="background:#38bdf855"></div>Mon–Fri</div>
      <div class="cal-leg-i"><div class="cal-leg-d" style="background:#f472b655"></div>Wed +🧹</div>
      <div class="cal-leg-i"><div class="cal-leg-d" style="background:#f472b655"></div>Sat</div>
      <div class="cal-leg-i"><div class="cal-leg-d" style="background:#34d39955"></div>Sun</div>
    </div>
  </div>
  <div class="slabel" style="padding-top:24px">STREAKS</div>
  <div class="slist" id="slist"></div>
</div>

<script>
// ── WORKOUT ──────────────────────────────────────────────────────────────────
const WKT_EX=[
  {reps:20,name:"Pompes"},
  {reps:15,name:"Squats"},
  {reps:20,name:"Abs"},
  {reps:10,name:"Biceps"},
  {reps:10,name:"Triceps"},
  {reps:10,name:"Shoulders"},
  {reps:10,name:"Middle"},
];
const WKT_ROUNDS=3;
let wktDone=[];
function resetWkt(){wktDone=Array.from({length:WKT_ROUNDS},()=>Array(WKT_EX.length).fill(false));}
resetWkt();

function toggleWex(r,e){
  wktDone[r][e]=!wktDone[r][e];
  renderWkt();
}

function renderWkt(){
  const el=document.getElementById("wkt-panel");
  if(!el)return;
  const total=WKT_ROUNDS*WKT_EX.length;
  const done=wktDone.flat().filter(Boolean).length;
  const pct=Math.round(done/total*100);
  let activeR=WKT_ROUNDS-1;
  for(let r=0;r<WKT_ROUNDS;r++){if(wktDone[r].some(v=>!v)){activeR=r;break;}}

  let h=`<div class="wkt-top">
    <span class="wkt-ttl">💪 3 ROUNDS — NO BREAK</span>
    <span class="wkt-prog-txt">${done}/${total}</span>
  </div>
  <div class="wkt-pbar"><div class="wkt-pbar-f" style="width:${pct}%"></div></div>`;

  for(let r=0;r<WKT_ROUNDS;r++){
    const rd=wktDone[r].every(Boolean);
    const ra=r===activeR&&!rd;
    const lc=rd?"rdone":ra?"active":"";
    h+=`<div class="wkt-round"><div class="wkt-rlbl ${lc}">${rd?"✓ ":""}ROUND ${r+1}</div><div class="wkt-grid">`;
    WKT_EX.forEach((ex,e)=>{
      const ck=wktDone[r][e];
      h+=`<button class="wex${ck?" chk":""}" onclick="toggleWex(${r},${e})">
        <div class="wex-dot">${ck?"✓":""}</div>
        <div><div class="wex-reps">${ex.reps}×</div><div class="wex-name">${ex.name}</div></div>
      </button>`;
    });
    h+=`</div></div>`;
  }
  el.innerHTML=h;
}

// ── ROUTINES ─────────────────────────────────────────────────────────────────
const SPORT_LABEL="Push up, abs, squat";

const AD={id:"afterdinner",title:"Après Dîner",subtitle:"10 min — chaque soir",totalMin:10,color:"#fdba74",icon:"🍽️",
  tasks:[{label:"Rangement",min:10},{label:"Préparer les tupperware",min:2},{label:"Vaisselle & choses qui traînent",min:8}]};

const WDAY=[
  {id:"morning",title:"Morning Routine",subtitle:"20 min",totalMin:20,color:"#4ade80",icon:"🌅",
   tasks:[{label:"Eau et set up sport",min:1},{label:SPORT_LABEL,min:5},{label:"Stretch",min:2},{label:"Cleaning",min:5},{label:"Breakfast & clean",min:7}]},
  {id:"shower",title:"Douche / Habiller",subtitle:"10 min",totalMin:10,color:"#38bdf8",icon:"🚿",
   tasks:[{label:"Douche",min:3},{label:"Sécher",min:1},{label:"Dents",min:2},{label:"Crème, déo etc",min:1},{label:"Habiller",min:3}]},
  {id:"office",title:"Office Setup",subtitle:"10 min",totalMin:10,color:"#a78bfa",icon:"💻",
   tasks:[{label:"Café, eau",min:1},{label:"Set up computer",min:2},{label:"Delete junk / check to do",min:7}]},
  {id:"deepwork",title:"Deep Work",subtitle:"40 min — 5× per day",totalMin:40,color:"#f59e0b",icon:"🧠",
   tasks:[{label:"Deep focus session",min:40}],isDeepWork:true,targetPerDay:5},
  {id:"closing",title:"Closing the Day",subtitle:"15 min",totalMin:15,color:"#fb923c",icon:"📋",
   tasks:[{label:"Delete emails of the day",min:5},{label:"Last actions & next steps",min:5},{label:"To do for tomorrow",min:4},{label:"Close the app",min:1}]},
  {id:"evening",title:"Evening Prep",subtitle:"10 min",totalMin:10,color:"#e879f9",icon:"🌙",
   tasks:[{label:"Préparer sac & vêtements",min:2},{label:"Préparer petit dej",min:1},{label:"Douche",min:3},{label:"Crème & séchage",min:2},{label:"Brossage de dents",min:2}]},
  {id:"peace",title:"Peace of Mind",subtitle:"15 min",totalMin:15,color:"#34d399",icon:"🧘",
   tasks:[{label:"Rangement",min:10},{label:"Stretching",min:5}]},
  AD
];

const WED_X={id:"wed_clean",title:"Nettoyage Mercredi",subtitle:"45 min",totalMin:45,color:"#f472b6",icon:"🧹",
  tasks:[{label:"Ranger le bordel",min:14},{label:"Aspirateur",min:8},{label:"Serpillère",min:3},{label:"Ranger le linge",min:20}]};

const SAT=[
  {id:"sat_morning",title:"Morning Routine",subtitle:"20 min",totalMin:20,color:"#4ade80",icon:"🌅",
   tasks:[{label:"Eau et set up sport",min:1},{label:SPORT_LABEL,min:5},{label:"Stretch",min:2},{label:"Cleaning",min:5},{label:"Breakfast & clean",min:7}]},
  {id:"sat_shower",title:"Douche / Habiller",subtitle:"10 min",totalMin:10,color:"#38bdf8",icon:"🚿",
   tasks:[{label:"Douche",min:3},{label:"Sécher",min:1},{label:"Dents",min:2},{label:"Crème, déo etc",min:1},{label:"Habiller",min:3}]},
  {id:"sat_clean",title:"Nettoyage du Matin",subtitle:"1h",totalMin:60,color:"#f472b6",icon:"🧹",
   tasks:[{label:"Remettre tout à sa place",min:6},{label:"Machine à laver + BOB",min:1},{label:"Spray salle de bain",min:1},{label:"Plier le linge",min:10},{label:"Nettoyage salle de bain",min:10},{label:"Repasser 5 chemises",min:10},{label:"Cuisiner & vider frigo",min:20},{label:"Vider les poubelles",min:2}]},
  {id:"sat_evening",title:"Evening Prep",subtitle:"10 min",totalMin:10,color:"#e879f9",icon:"🌙",
   tasks:[{label:"Préparer sac & vêtements",min:2},{label:"Préparer petit dej",min:1},{label:"Douche",min:3},{label:"Crème & séchage",min:2},{label:"Brossage de dents",min:2}]},
  AD
];

const SUN=[
  {id:"sun_morning",title:"Morning Routine",subtitle:"20 min",totalMin:20,color:"#4ade80",icon:"🌅",
   tasks:[{label:"Eau et set up sport",min:1},{label:SPORT_LABEL,min:5},{label:"Stretch",min:2},{label:"Cleaning",min:5},{label:"Breakfast & clean",min:7}]},
  {id:"sun_shower",title:"Douche / Habiller",subtitle:"10 min",totalMin:10,color:"#38bdf8",icon:"🚿",
   tasks:[{label:"Douche",min:3},{label:"Sécher",min:1},{label:"Dents",min:2},{label:"Crème, déo etc",min:1},{label:"Habiller",min:3}]},
  {id:"sun_peace",title:"Peace of Mind",subtitle:"15 min",totalMin:15,color:"#34d399",icon:"🧘",
   tasks:[{label:"Rangement",min:10},{label:"Stretching",min:5}]},
  {id:"sun_evening",title:"Evening Prep",subtitle:"10 min",totalMin:10,color:"#e879f9",icon:"🌙",
   tasks:[{label:"Préparer sac & vêtements",min:2},{label:"Préparer petit dej",min:1},{label:"Douche",min:3},{label:"Crème & séchage",min:2},{label:"Brossage de dents",min:2}]},
  AD
];

const ALL_R=[...WDAY,WED_X,...SAT.filter(r=>!WDAY.find(w=>w.id===r.id)),...SUN.filter(r=>!WDAY.find(w=>w.id===r.id))].filter((r,i,a)=>a.findIndex(x=>x.id===r.id)===i);

function getRs(d){const w=d.getDay();if(w===6)return SAT;if(w===0)return SUN;if(w===3)return[...WDAY,WED_X];return WDAY;}
function getDayChip(d){const w=d.getDay();if(w===6)return{t:"SAT",c:"#f472b6"};if(w===0)return{t:"SUN",c:"#34d399"};if(w===3)return{t:"WED +🧹",c:"#f472b6"};return{t:"WEEKDAY",c:"#38bdf8"};}

// ── STORAGE ───────────────────────────────────────────────────────────────────
const SK="myday_v1";
let DB=(()=>{try{return JSON.parse(localStorage.getItem(SK)||"{}")}catch{return{}}})();
function saveDB(){try{localStorage.setItem(SK,JSON.stringify(DB))}catch{}}
const toKey=()=>new Date().toISOString().split("T")[0];
const pad=n=>String(n).padStart(2,"0");
const fmt=s=>pad(Math.floor(s/60))+":"+pad(s%60);

function getStreak(id){
  const cs=DB[id]?.completions||[];
  if(!cs.length)return 0;
  const s=[...cs].sort((a,b)=>b.localeCompare(a));
  let k=toKey(),n=0;
  for(const d of s){if(d===k){n++;const p=new Date(k);p.setDate(p.getDate()-1);k=p.toISOString().split("T")[0]}else break;}
  return n;
}
function getCmps(id){return DB[id]?.completions||[];}
function getCount(id){return(DB[id]?.todayCounts||{})[toKey()]||0;}
function markDone(id){
  const t=toKey(),r=DB[id]||{};
  const cs=r.completions||[];
  const tc=r.todayCounts||{};
  DB[id]={...r,completions:cs.includes(t)?cs:[...cs,t],todayCounts:{...tc,[t]:(tc[t]||0)+1}};
  saveDB();
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function goTo(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("on"));
  document.getElementById("p-"+id).classList.add("on");
  window.scrollTo(0,0);
  if(id==="home")renderHome();
  if(id==="cal")renderCal();
}

// ── HOME ──────────────────────────────────────────────────────────────────────
function renderHome(){
  const now=new Date(),today=toKey(),rs=getRs(now);
  const chip=getDayChip(now);
  document.getElementById("h-date").textContent=now.toLocaleDateString("en-GB",{weekday:"long",month:"short",day:"numeric"});
  const hc=document.getElementById("h-chip");
  hc.textContent=chip.t;hc.style.background=chip.c+"22";hc.style.color=chip.c;

  let done=0;
  rs.forEach(r=>{const d=r.isDeepWork?Math.min(getCount(r.id),r.targetPerDay):(getCmps(r.id).includes(today)?1:0);if(d>0)done++;});
  const pct=Math.round(done/rs.length*100);
  const circ=289;
  document.getElementById("rpct").textContent=pct+"%";
  document.getElementById("rsub").textContent=done+"/"+rs.length;
  document.getElementById("rarc").setAttribute("stroke-dashoffset",circ*(1-pct/100));
  document.getElementById("rarc").setAttribute("stroke",pct===100?"#4ade80":"#38bdf8");
  document.getElementById("rwin").style.display=pct===100?"block":"none";

  const wrap=document.getElementById("rcards");wrap.innerHTML="";
  rs.forEach(r=>{
    const cs=getCmps(r.id),streak=getStreak(r.id);
    const dt=r.isDeepWork?getCount(r.id):(cs.includes(today)?1:0);
    const tgt=r.isDeepWork?r.targetPerDay:1;
    const isDone=dt>=tgt;
    const tot=r.tasks.reduce((a,t)=>a+t.min,0);
    let badges="";
    if(isDone)badges+=`<span class="rc-badge" style="background:${r.color}22;color:${r.color}">✓ done</span>`;
    if(r.isDeepWork)badges+=`<span class="rc-badge" style="background:#f59e0b22;color:#f59e0b">${dt}/${tgt}</span>`;
    const bars=r.tasks.map((t,i)=>`<div style="flex:${t.min/tot};background:${r.color}${(40+i*18).toString(16).padStart(2,"0")};border-radius:2px"></div>`).join("");
    const btn=document.createElement("button");
    btn.className="rc"+(isDone?" done":"");
    btn.innerHTML=`
      <div class="rc-row">
        <div class="rc-icon" style="background:${isDone?"#1a1a1a":r.color+"1a"};border:1.5px solid ${isDone?"#222":r.color+"44"}">${r.icon}</div>
        <div class="rc-mid">
          <div class="rc-name">${r.title}${badges}</div>
          <div class="rc-sub">${r.subtitle}</div>
        </div>
        <div class="rc-right">
          ${streak>0?`<div class="rc-streak" style="color:${r.color}">🔥 ${streak}</div>`:""}
          <div class="rc-min">${r.totalMin} min</div>
        </div>
      </div>
      <div class="rc-bar">${bars}</div>`;
    btn.onclick=()=>startR(r);
    wrap.appendChild(btn);
  });
}

// ── TIMER ─────────────────────────────────────────────────────────────────────
let TR=null,mSec=0,tSec=0,cIdx=0,tDone=[],running=false,iv=null;

function startR(r){
  TR=r;mSec=r.totalMin*60;tSec=r.tasks[0].min*60;cIdx=0;tDone=[];running=false;
  clearInterval(iv);resetWkt();
  document.getElementById("t-hdr").textContent=r.icon+" "+r.title.toUpperCase();
  document.getElementById("tarc").setAttribute("stroke",r.color);
  document.getElementById("cbtn").style.cssText=`background:${r.color}18;border:1px solid ${r.color}44;color:${r.color}`;
  document.getElementById("t-playbtn").style.cssText=`background:${r.color};color:#000`;
  renderTimer();renderTasks();
  goTo("timer");
}

function renderTimer(){
  const tot=TR.totalMin*60,pct=(tot-mSec)/tot;
  const circ=477.5;
  document.getElementById("tarc").setAttribute("stroke-dashoffset",circ*(1-pct));
  document.getElementById("t-time").textContent=fmt(mSec);
  const pb=document.getElementById("t-playbtn");
  pb.textContent=running?"⏸  Pause":"▶  Start";
  pb.style.background=running?"#1e1e1e":TR.color;
  pb.style.color=running?"#fff":"#000";
}

function renderTasks(){
  const list=document.getElementById("tlist");list.innerHTML="";
  TR.tasks.forEach((task,i)=>{
    const isCur=i===cIdx&&running&&!tDone.includes(i);
    const isDone=tDone.includes(i);
    const tPct=isCur?((task.min*60-tSec)/(task.min*60)*100):(isDone?100:0);
    const timeStr=isCur?fmt(tSec):task.min+"m";
    const isWkt=task.label===SPORT_LABEL;
    const row=document.createElement("div");
    row.className="trow"+(isCur?" cur":"")+(isDone?" done":"");
    row.style.setProperty("--c",TR.color);
    row.innerHTML=`
      <div class="tr-top">
        <div class="tnum">${isDone?"✓":i+1}</div>
        <div class="tlbl">${task.label}</div>
        <div class="ttim">${timeStr}</div>
      </div>
      <div class="tbar"><div class="tbarf" style="width:${tPct}%;background:${TR.color}"></div></div>
      ${isWkt?`<div class="wkt" id="wkt-panel"></div>`:""}`;
    list.appendChild(row);
    if(isWkt)renderWkt();
  });
}

function toggleTimer(){
  running=!running;
  if(running)iv=setInterval(tick,1000);
  else clearInterval(iv);
  renderTimer();renderTasks();
}

function tick(){
  if(mSec>0)mSec--;
  if(tSec>1){tSec--;}
  else{
    if(!tDone.includes(cIdx))tDone.push(cIdx);
    const nx=cIdx+1;
    if(nx<TR.tasks.length){cIdx=nx;tSec=TR.tasks[nx].min*60;}
    else tSec=0;
  }
  if(mSec<=0){clearInterval(iv);running=false;}
  renderTimer();renderTasks();
}

function resetTimer(){
  clearInterval(iv);running=false;
  mSec=TR.totalMin*60;tSec=TR.tasks[0].min*60;cIdx=0;tDone=[];
  resetWkt();renderTimer();renderTasks();
}

function completeR(){
  clearInterval(iv);running=false;
  markDone(TR.id);
  goTo("home");
}

// ── CALENDAR ──────────────────────────────────────────────────────────────────
let calD=new Date();
function calMove(d){calD=new Date(calD.getFullYear(),calD.getMonth()+d,1);renderCal();}

function renderCal(){
  const yr=calD.getFullYear(),mo=calD.getMonth();
  document.getElementById("cal-mth").textContent=calD.toLocaleDateString("en-GB",{month:"long",year:"numeric"});
  const fdow=new Date(yr,mo,1).getDay();
  const dim=new Date(yr,mo+1,0).getDate();
  const today=toKey();
  const empty=fdow===0?6:fdow-1;

  document.getElementById("cal-dow").innerHTML=["S","M","T","W","T","F","S"].map(d=>`<div class="cal-d">${d}</div>`).join("");
  const g=document.getElementById("cal-grid");g.innerHTML="";
  for(let i=0;i<empty;i++){const e=document.createElement("div");g.appendChild(e);}
  for(let d=1;d<=dim;d++){
    const key=`${yr}-${pad(mo+1)}-${pad(d)}`;
    const dobj=new Date(yr,mo,d);
    const rs=getRs(dobj);
    const cnt=rs.filter(r=>(DB[r.id]?.completions||[]).includes(key)).length;
    const tot=rs.length;
    const isT=key===today,isP=key<today;
    const w=dobj.getDay(),isSat=w===6,isSun=w===0;
    const intensity=cnt/Math.max(tot,1);
    const c=document.createElement("div");
    c.className="cal-cell"+(isT?" today":"")+(isP&&cnt===0?" past":"");
    if(cnt>0)c.style.background=`rgba(74,222,128,${.1+intensity*.8})`;
    if(!isT)c.style.borderColor=isSat?"#f472b630":isSun?"#34d39930":"#1a1a1a";
    const dc=cnt>0?"#fff":isT?"#4ade80":isSat?"#f472b6":isSun?"#34d399":"#333";
    c.innerHTML=`<div class="cal-dn" style="color:${dc};font-weight:${isT?700:400}">${d}</div>${cnt>0?`<div class="cal-dc">${cnt}</div>`:""}`;
    g.appendChild(c);
  }

  const sl=document.getElementById("slist");sl.innerHTML="";
  ALL_R.forEach(r=>{
    const s=getStreak(r.id);
    const row=document.createElement("div");
    row.className="srow";
    row.innerHTML=`<div class="srow-ic">${r.icon}</div>
      <div class="srow-mid"><div class="srow-nm">${r.title}</div>
        <div class="srow-b"><div class="srow-bf" style="width:${Math.min(s*10,100)}%;background:${r.color}"></div></div>
      </div>
      <div class="srow-r"><div class="srow-n" style="color:${r.color}">🔥 ${s}</div><div class="srow-l">day streak</div></div>`;
    sl.appendChild(row);
  });
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderHome();
</script>
