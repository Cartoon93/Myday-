<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DayFlow">
<meta name="theme-color" content="#0a0a0f">
<title>DayFlow</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0f;
  --bg2:#111118;
  --bg3:#1a1a24;
  --bg4:#22222f;
  --border:#2a2a3a;
  --text:#e8e8f0;
  --muted:#6b6b85;
  --cyan:#00d4aa;
  --cyan2:#00a882;
  --cyan-dim:#003d30;
  --green:#4ade80;
  --amber:#f59e0b;
  --red:#ef4444;
  --purple:#a78bfa;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;overflow:hidden}

/* Layout */
#app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto}
#header{padding:16px 20px 8px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:80px}
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(10,10,15,0.95);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;z-index:100}
.nav-btn{flex:1;padding:12px 4px 16px;display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;color:var(--muted);font-size:10px;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;transition:color .2s}
.nav-btn.active{color:var(--cyan)}
.nav-btn svg{width:22px;height:22px;stroke-width:1.5}

/* Page transitions */
.page{display:none;padding:0 16px}
.page.active{display:block}

/* ---- TODAY PAGE ---- */
.date-label{font-size:13px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.streak-badge{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--amber);font-weight:600}

.blocks-grid{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.block-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:border-color .2s}
.block-card.active-block{border-color:var(--cyan)}
.block-header{display:flex;align-items:center;gap:12px;padding:14px 16px}
.block-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.block-icon.cyan{background:var(--cyan-dim);color:var(--cyan)}
.block-info{flex:1;min-width:0}
.block-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.block-dur{font-size:12px;color:var(--muted);margin-top:2px}
.block-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.block-status{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center}
.block-status.done{background:var(--cyan);border-color:var(--cyan)}
.block-status.done svg{stroke:var(--bg)}
.block-count{font-size:11px;color:var(--muted)}

/* Ring progress inside card when active */
.block-progress-bar{height:3px;background:var(--bg4);position:relative}
.block-progress-fill{height:100%;background:var(--cyan);transition:width .5s linear}

/* ---- TIMER PAGE ---- */
#timer-page{padding:0}
.timer-header{padding:16px 20px 0;display:flex;align-items:center;gap:12px}
.back-btn{width:36px;height:36px;background:var(--bg3);border:none;border-radius:50%;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center}
.timer-title{font-size:17px;font-weight:600}

.ring-container{display:flex;justify-content:center;align-items:center;padding:24px 0 12px;position:relative}
.ring-container svg{overflow:visible}
.timer-time{position:absolute;text-align:center}
.timer-time .big{font-size:42px;font-weight:700;letter-spacing:-1px;font-variant-numeric:tabular-nums}
.timer-time .label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:2px}

.controls{display:flex;justify-content:center;gap:16px;padding:0 20px 16px}
.ctrl-btn{width:64px;height:64px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .2s}
.ctrl-btn.play{background:var(--cyan);color:var(--bg)}
.ctrl-btn.reset{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.ctrl-btn svg{width:26px;height:26px;stroke-width:2}

.tasks-list{padding:0 16px 100px}
.task-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;transition:border-color .2s,background .2s}
.task-row.current{border-color:var(--cyan);background:rgba(0,212,170,0.06)}
.task-row.done-task{opacity:.5}
.task-dot{width:10px;height:10px;border-radius:50%;background:var(--border);flex-shrink:0;transition:background .3s}
.task-row.current .task-dot{background:var(--cyan);box-shadow:0 0 8px var(--cyan)}
.task-row.done-task .task-dot{background:var(--cyan2)}
.task-info{flex:1;min-width:0}
.task-name{font-size:14px;font-weight:500}
.task-dur-label{font-size:12px;color:var(--muted);margin-top:1px}
.task-mini-timer{font-size:13px;font-weight:600;color:var(--cyan);font-variant-numeric:tabular-nums;white-space:nowrap}

/* ---- CALENDAR PAGE ---- */
.cal-month{font-size:20px;font-weight:700;padding:8px 16px 16px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:0 16px}
.cal-dow{text-align:center;font-size:11px;color:var(--muted);padding:4px 0;text-transform:uppercase}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:13px;font-weight:500;position:relative;cursor:default}
.cal-day.today{background:var(--cyan);color:var(--bg);font-weight:700}
.cal-day.streak{background:var(--cyan-dim);color:var(--cyan)}
.cal-day.other-month{color:var(--bg4)}
.cal-day.partial::after{content:'';width:5px;height:5px;border-radius:50%;background:var(--amber);position:absolute;bottom:2px;right:calc(50% - 10px)}

.streak-summary{margin:20px 16px 0;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px}
.streak-row{display:flex;justify-content:space-between;margin-bottom:12px}
.streak-stat{text-align:center}
.streak-stat .num{font-size:24px;font-weight:700;color:var(--cyan)}
.streak-stat .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}

.week-blocks{margin:16px 16px 0}
.week-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.week-row{display:flex;gap:6px;margin-bottom:8px;align-items:center}
.week-row-name{font-size:12px;color:var(--muted);width:70px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.week-dot{width:26px;height:26px;border-radius:6px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted)}
.week-dot.done{background:var(--cyan-dim);color:var(--cyan)}

/* ---- Misc ---- */
.section-title{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin:20px 0 10px}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}

/* NoSleep overlay */
#nosleep-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;display:none;align-items:center;justify-content:center;flex-direction:column;gap:20px;text-align:center;padding:30px}
#nosleep-overlay.show{display:flex}
#nosleep-overlay h2{font-size:22px}
#nosleep-overlay p{color:var(--muted);font-size:15px;line-height:1.6}
#nosleep-overlay button{padding:14px 32px;background:var(--cyan);color:var(--bg);border:none;border-radius:24px;font-size:17px;font-weight:700;cursor:pointer}
</style>
</head>
<body>

<div id="nosleep-overlay">
  <div style="font-size:48px">⏱</div>
  <h2>Keep Timer Running</h2>
  <p>Tap START to enable background timing.<br>The timer will continue even when your screen turns off.</p>
  <button onclick="startTimerFromOverlay()">START TIMER</button>
</div>

<div id="app">
  <div id="header">
    <div>
      <div class="date-label" id="date-label"></div>
      <div style="font-size:22px;font-weight:700;margin-top:2px">Good morning 👋</div>
    </div>
    <div class="streak-badge">
      <span>🔥</span>
      <span id="header-streak">0</span>
    </div>
  </div>

  <div id="content">
    <!-- TODAY -->
    <div class="page active" id="page-today">
      <div class="blocks-grid" id="blocks-grid"></div>
    </div>

    <!-- TIMER -->
    <div class="page" id="page-timer" style="padding:0">
      <div class="timer-header">
        <button class="back-btn" onclick="goBack()" aria-label="Back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        </button>
        <div class="timer-title" id="timer-title">Select a block</div>
      </div>

      <div class="ring-container">
        <svg id="ring-svg" width="220" height="220" viewBox="0 0 220 220">
          <circle cx="110" cy="110" r="96" fill="none" stroke="#1a1a24" stroke-width="14"/>
          <circle id="ring-track" cx="110" cy="110" r="96" fill="none" stroke="#003d30" stroke-width="14" stroke-linecap="round"
            stroke-dasharray="603" stroke-dashoffset="603" transform="rotate(-90 110 110)" style="transition:stroke-dashoffset .5s linear"/>
          <circle id="ring-fill" cx="110" cy="110" r="96" fill="none" stroke="#00d4aa" stroke-width="14" stroke-linecap="round"
            stroke-dasharray="603" stroke-dashoffset="603" transform="rotate(-90 110 110)" style="transition:stroke-dashoffset .5s linear"/>
        </svg>
        <div class="timer-time">
          <div class="big" id="timer-display">00:00</div>
          <div class="label" id="timer-sublabel">total time</div>
        </div>
      </div>

      <div class="controls">
        <button class="ctrl-btn reset" onclick="resetTimer()" aria-label="Reset">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
        </button>
        <button class="ctrl-btn play" id="play-btn" onclick="toggleTimer()" aria-label="Play">
          <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        </button>
      </div>

      <div class="tasks-list" id="task-list"></div>
    </div>

    <!-- CALENDAR -->
    <div class="page" id="page-calendar">
      <div class="cal-month" id="cal-month-label"></div>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="streak-summary">
        <div class="streak-row">
          <div class="streak-stat"><div class="num" id="stat-streak">0</div><div class="lbl">Current streak</div></div>
          <div class="streak-stat"><div class="num" id="stat-best">0</div><div class="lbl">Best streak</div></div>
          <div class="streak-stat"><div class="num" id="stat-total">0</div><div class="lbl">Total days</div></div>
        </div>
      </div>
      <div class="week-blocks">
        <div class="week-label">This week's blocks</div>
        <div id="week-grid"></div>
      </div>
    </div>
  </div>

  <nav id="nav">
    <button class="nav-btn active" id="nav-today" onclick="showPage('today')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Today
    </button>
    <button class="nav-btn" id="nav-timer" onclick="showPage('timer')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="9"/><polyline points="12,6 12,12 15,15"/></svg>
      Timer
    </button>
    <button class="nav-btn" id="nav-calendar" onclick="showPage('calendar')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Calendar
    </button>
  </nav>
</div>

<script>
// ============================================================
// DATA
// ============================================================
const BLOCKS = [
  {
    id:'morning', emoji:'🌅', name:'Morning Routine', totalMin:20,
    tasks:[
      {name:'Eau & set up sport', min:1},
      {name:'Push-up, abs, squat', min:5},
      {name:'Stretch', min:2},
      {name:'Cleaning', min:5},
      {name:'Breakfast & clean up', min:7},
    ]
  },
  {
    id:'shower', emoji:'🚿', name:'Douche / Habiller', totalMin:10,
    tasks:[
      {name:'Douche', min:3},
      {name:'Sécher', min:1},
      {name:'Brossage des dents', min:2},
      {name:'Crème, déo etc', min:1},
      {name:'Habiller', min:3},
    ]
  },
  {
    id:'office', emoji:'💼', name:'Office Set-up', totalMin:10,
    tasks:[
      {name:'Café & eau', min:1},
      {name:'Set up computer', min:2},
      {name:'Delete junk emails & check to-do', min:7},
    ]
  },
  {
    id:'deepwork', emoji:'🧠', name:'Deep Work', totalMin:40,
    tasks:[
      {name:'Deep focus session', min:40},
    ]
  },
  {
    id:'closing', emoji:'🏁', name:'Closing the Day', totalMin:15,
    tasks:[
      {name:'Delete emails of the day', min:5},
      {name:'Last actions & next steps', min:5},
      {name:'To-do for tomorrow', min:4},
      {name:'Close apps', min:1},
    ]
  },
  {
    id:'evening', emoji:'🌙', name:'Evening Routine', totalMin:10,
    tasks:[
      {name:'Préparer sac sport & vêtements', min:2},
      {name:'Préparer le petit-déj', min:1},
      {name:'Douche', min:3},
      {name:'Crème & séchage', min:2},
      {name:'Brossage de dents', min:2},
    ]
  },
  {
    id:'peace', emoji:'🧘', name:'Peace of Mind', totalMin:15,
    tasks:[
      {name:'Rangement', min:10},
      {name:'Stretching', min:5},
    ]
  },
];

// Deep work target per day
const DEEPWORK_TARGET = 5;

// ============================================================
// STORAGE
// ============================================================
function loadData(){
  try{ return JSON.parse(localStorage.getItem('dayflow_v2')||'{}'); }
  catch(e){ return {}; }
}
function saveData(d){ localStorage.setItem('dayflow_v2', JSON.stringify(d)); }

function getTodayKey(){ return new Date().toISOString().slice(0,10); }

function getDayData(key){
  const d = loadData();
  return d[key] || {};
}

function markBlockDone(blockId){
  const d = loadData();
  const key = getTodayKey();
  if(!d[key]) d[key]={};
  if(!d[key][blockId]) d[key][blockId]=0;
  d[key][blockId]++;
  saveData(d);
}

function getBlockCount(blockId, key){
  const day = getDayData(key||getTodayKey());
  return day[blockId]||0;
}

// ============================================================
// PAGES
// ============================================================
let currentPage='today';

function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  currentPage=name;
  if(name==='today') renderToday();
  if(name==='calendar') renderCalendar();
}

function goBack(){
  showPage('today');
}

// ============================================================
// TODAY RENDER
// ============================================================
function renderToday(){
  const now = new Date();
  const opts = {weekday:'long',month:'long',day:'numeric'};
  document.getElementById('date-label').textContent = now.toLocaleDateString('en-GB',opts);
  
  const streak = calcStreak();
  document.getElementById('header-streak').textContent = streak + ' day' + (streak!==1?'s':'');

  const grid = document.getElementById('blocks-grid');
  grid.innerHTML='';
  
  BLOCKS.forEach(block=>{
    const count = getBlockCount(block.id);
    const isDeepWork = block.id==='deepwork';
    const isDone = isDeepWork ? count>=DEEPWORK_TARGET : count>0;
    
    const card = document.createElement('div');
    card.className='block-card'+(activeBlock&&activeBlock.id===block.id?' active-block':'');
    card.innerHTML=`
      <div class="block-header">
        <div class="block-icon cyan">${block.emoji}</div>
        <div class="block-info">
          <div class="block-name">${block.name}</div>
          <div class="block-dur">${block.totalMin} min${isDeepWork?' · '+count+'/'+DEEPWORK_TARGET+' done':''}</div>
        </div>
        <div class="block-right">
          <div class="block-status${isDone?' done':''}">
            ${isDone?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20,6 9,17 4,12"/></svg>':''}
          </div>
          ${isDeepWork&&!isDone?`<div class="block-count">${count}/${DEEPWORK_TARGET}</div>`:''}
        </div>
      </div>
      ${activeBlock&&activeBlock.id===block.id?`<div class="block-progress-bar"><div class="block-progress-fill" id="card-prog-${block.id}" style="width:${getTimerPct()}%"></div></div>`:''}
    `;
    card.onclick=()=>{
      selectBlock(block);
      showPage('timer');
    };
    grid.appendChild(card);
  });
}

function getTimerPct(){
  if(!activeBlock) return 0;
  const elapsed = timerRunning ? (Date.now()-startTimestamp)/1000 : elapsedSeconds;
  return Math.min(100, (elapsed/(activeBlock.totalMin*60))*100);
}

// ============================================================
// TIMER ENGINE
// ============================================================
let activeBlock = null;
let timerRunning = false;
let elapsedSeconds = 0;
let startTimestamp = null;
let rafId = null;
let pendingBlock = null;

function selectBlock(block){
  if(timerRunning) resetTimer();
  activeBlock = block;
  elapsedSeconds = 0;
  startTimestamp = null;
  document.getElementById('timer-title').textContent = block.name;
  renderTaskList();
  updateTimerDisplay();
}

function toggleTimer(){
  if(!activeBlock) return;
  if(timerRunning){
    // Pause
    elapsedSeconds = (Date.now()-startTimestamp)/1000;
    localStorage.removeItem('dayflow_ts');
    timerRunning=false;
    cancelAnimationFrame(rafId);
    updatePlayBtn(false);
    releaseWakeLock();
  } else {
    // Need user gesture — request wake lock
    pendingBlock = activeBlock;
    document.getElementById('nosleep-overlay').classList.add('show');
  }
}

function startTimerFromOverlay(){
  document.getElementById('nosleep-overlay').classList.remove('show');
  timerRunning=true;
  startTimestamp = Date.now() - elapsedSeconds*1000;
  localStorage.setItem('dayflow_ts', startTimestamp);
  requestWakeLock();
  updatePlayBtn(true);
  tick();
}

function resetTimer(){
  timerRunning=false;
  cancelAnimationFrame(rafId);
  elapsedSeconds=0;
  startTimestamp=null;
  updatePlayBtn(false);
  releaseWakeLock();
  updateTimerDisplay();
  renderTaskList();
}

function tick(){
  if(!timerRunning) return;
  const elapsed = (Date.now()-startTimestamp)/1000;
  elapsedSeconds = elapsed;
  updateTimerDisplay();
  
  const totalSec = activeBlock.totalMin*60;
  if(elapsed>=totalSec){
    timerRunning=false;
    elapsedSeconds=totalSec;
    updateTimerDisplay();
    updatePlayBtn(false);
    releaseWakeLock();
    markBlockDone(activeBlock.id);
    renderToday();
    // Flash completion
    document.getElementById('ring-fill').style.stroke='#4ade80';
    setTimeout(()=>{ document.getElementById('ring-fill').style.stroke='#00d4aa'; },2000);
    return;
  }
  rafId = requestAnimationFrame(tick);
}

function updateTimerDisplay(){
  const elapsed = timerRunning ? (Date.now()-startTimestamp)/1000 : elapsedSeconds;
  const totalSec = activeBlock ? activeBlock.totalMin*60 : 0;
  const remaining = Math.max(0, totalSec - elapsed);
  
  document.getElementById('timer-display').textContent = fmtTime(remaining);
  document.getElementById('timer-sublabel').textContent = activeBlock ? activeBlock.name : 'total time';
  
  // Ring
  const pct = totalSec>0 ? Math.min(1, elapsed/totalSec) : 0;
  const circ=603;
  document.getElementById('ring-fill').style.strokeDashoffset = circ-(pct*circ);
  
  renderTaskList();
}

function fmtTime(sec){
  const m=Math.floor(sec/60);
  const s=Math.floor(sec%60);
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

function updatePlayBtn(playing){
  const icon = document.getElementById('play-icon');
  if(playing){
    icon.innerHTML='<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>';
  } else {
    icon.innerHTML='<polygon points="5,3 19,12 5,21"/>';
  }
}

function renderTaskList(){
  if(!activeBlock){ document.getElementById('task-list').innerHTML=''; return; }
  const elapsed = timerRunning ? (Date.now()-startTimestamp)/1000 : elapsedSeconds;
  
  // Figure out which task is current
  let cumSec=0;
  const list = document.getElementById('task-list');
  list.innerHTML='';
  
  activeBlock.tasks.forEach((task,i)=>{
    const taskStart=cumSec;
    const taskEnd=cumSec+task.min*60;
    cumSec=taskEnd;
    
    let state='upcoming';
    if(elapsed>=taskEnd) state='done';
    else if(elapsed>=taskStart) state='current';
    
    const row=document.createElement('div');
    row.className='task-row'+(state==='current'?' current':'')+(state==='done'?' done-task':'');
    
    let miniTimer='';
    if(state==='current'){
      const taskRemain=Math.max(0,taskEnd-elapsed);
      miniTimer=`<div class="task-mini-timer">${fmtTime(taskRemain)}</div>`;
    } else if(state==='done'){
      miniTimer=`<div class="task-mini-timer" style="color:var(--cyan2)">✓</div>`;
    } else {
      miniTimer=`<div class="task-mini-timer" style="color:var(--muted)">${task.min}:00</div>`;
    }
    
    row.innerHTML=`
      <div class="task-dot"></div>
      <div class="task-info">
        <div class="task-name">${task.name}</div>
        <div class="task-dur-label">${task.min} min</div>
      </div>
      ${miniTimer}
    `;
    list.appendChild(row);
  });
}

// ============================================================
// WAKE LOCK (keeps screen on)
// ============================================================
let wakeLock=null;
async function requestWakeLock(){
  if('wakeLock' in navigator){
    try{ wakeLock=await navigator.wakeLock.request('screen'); }
    catch(e){}
  }
}
function releaseWakeLock(){
  if(wakeLock){ wakeLock.release().catch(()=>{}); wakeLock=null; }
}
// Re-acquire if page becomes visible again
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible' && timerRunning){
    requestWakeLock();
    const saved = localStorage.getItem('dayflow_ts');
    if(saved) startTimestamp = parseInt(saved);
    tick();
  }
});

// ============================================================
// CALENDAR
// ============================================================
function calcStreak(){
  const d=loadData();
  let streak=0;
  const today=new Date();
  for(let i=0;i<365;i++){
    const dt=new Date(today);
    dt.setDate(dt.getDate()-i);
    const k=dt.toISOString().slice(0,10);
    const day=d[k]||{};
    const blocks=Object.keys(day).length;
    if(blocks>0) streak++;
    else if(i>0) break;
  }
  return streak;
}

function calcBestStreak(){
  const d=loadData();
  let best=0,cur=0;
  const today=new Date();
  for(let i=364;i>=0;i--){
    const dt=new Date(today);
    dt.setDate(dt.getDate()-i);
    const k=dt.toISOString().slice(0,10);
    const day=d[k]||{};
    if(Object.keys(day).length>0){ cur++; if(cur>best) best=cur; }
    else cur=0;
  }
  return best;
}

function calcTotalActiveDays(){
  const d=loadData();
  return Object.keys(d).filter(k=>Object.keys(d[k]).length>0).length;
}

function renderCalendar(){
  const now=new Date();
  const y=now.getFullYear(), m=now.getMonth();
  
  document.getElementById('cal-month-label').textContent=
    now.toLocaleDateString('en-GB',{month:'long',year:'numeric'});

  const d=loadData();
  const grid=document.getElementById('cal-grid');
  grid.innerHTML='';
  
  // Days of week headers
  ['M','T','W','T','F','S','S'].forEach(day=>{
    const el=document.createElement('div');
    el.className='cal-dow';
    el.textContent=day;
    grid.appendChild(el);
  });
  
  // First day (Monday=0)
  const firstDay=new Date(y,m,1);
  let startDow=(firstDay.getDay()+6)%7;
  
  // Fill blanks
  for(let i=0;i<startDow;i++){
    const el=document.createElement('div');
    el.className='cal-day other-month';
    grid.appendChild(el);
  }
  
  const daysInMonth=new Date(y,m+1,0).getDate();
  const todayStr=now.toISOString().slice(0,10);
  
  for(let day=1;day<=daysInMonth;day++){
    const dt=new Date(y,m,day);
    const k=dt.toISOString().slice(0,10);
    const dayData=d[k]||{};
    const blocksDone=Object.keys(dayData).length;
    const deepDone=(dayData['deepwork']||0);
    
    const el=document.createElement('div');
    let cls='cal-day';
    if(k===todayStr) cls+=' today';
    else if(blocksDone>=5) cls+=' streak';
    else if(blocksDone>0) cls+=' partial';
    el.className=cls;
    el.textContent=day;
    grid.appendChild(el);
  }
  
  // Stats
  document.getElementById('stat-streak').textContent=calcStreak();
  document.getElementById('stat-best').textContent=calcBestStreak();
  document.getElementById('stat-total').textContent=calcTotalActiveDays();
  
  // Week grid
  renderWeekGrid();
}

function renderWeekGrid(){
  const d=loadData();
  const weekGrid=document.getElementById('week-grid');
  weekGrid.innerHTML='';
  const today=new Date();
  
  BLOCKS.forEach(block=>{
    const row=document.createElement('div');
    row.className='week-row';
    
    let dots='';
    for(let i=6;i>=0;i--){
      const dt=new Date(today);
      dt.setDate(dt.getDate()-i);
      const k=dt.toISOString().slice(0,10);
      const dayData=d[k]||{};
      const done=block.id==='deepwork'?(dayData[block.id]||0)>=DEEPWORK_TARGET:(dayData[block.id]||0)>0;
      const label=['M','T','W','T','F','S','S'][(dt.getDay()+6)%7];
      dots+=`<div class="week-dot${done?' done':''}" title="${dt.toISOString().slice(0,10)}">${label}</div>`;
    }
    
    row.innerHTML=`<div class="week-row-name">${block.emoji} ${block.name}</div>${dots}`;
    weekGrid.appendChild(row);
  });
}
